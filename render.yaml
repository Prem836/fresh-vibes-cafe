services:
  - type: web
    name: fresh-vibes-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: OWNER_EMAIL
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: PORT
        value: 3001
