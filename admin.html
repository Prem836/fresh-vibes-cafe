<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — Fresh Vibes Café</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1c2330;
      --border:    #30363d;
      --gold:      #f5c518;
      --gold-dim:  #c9971f;
      --green:     #3fb950;
      --red:       #f85149;
      --yellow:    #d29922;
      --blue:      #58a6ff;
      --text:      #e6edf3;
      --text-dim:  #8b949e;
      --radius:    12px;
      --shadow:    0 8px 32px rgba(0,0,0,.4);
    }
    html { font-size: 15px; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Login Screen ── */
    #loginScreen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at top, #1a1a3e 0%, #0d1117 70%);
      padding: 20px;
    }
    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 420px;
      box-shadow: var(--shadow); text-align: center;
      animation: fadeUp .5s ease;
    }
    .login-logo { font-size: 36px; font-weight: 800; letter-spacing: 2px; margin-bottom: 6px; }
    .login-logo .fr { color: var(--gold); font-style: italic; }
    .login-logo .vi { color: #fff; }
    .login-logo .ca { color: var(--gold); font-size: 13px; letter-spacing: 6px; display: block; margin-top: 4px; }
    .login-sub { color: var(--text-dim); font-size: 13px; margin-bottom: 32px; }
    .login-label { display: block; text-align: left; font-size: 13px; font-weight: 600; color: var(--text-dim); margin-bottom: 6px; letter-spacing: .5px; }
    .login-input {
      width: 100%; padding: 13px 16px; background: var(--bg);
      border: 1px solid var(--border); border-radius: var(--radius); color: var(--text);
      font-size: 15px; font-family: 'Inter', sans-serif; outline: none;
      transition: border-color .2s;
    }
    .login-input:focus { border-color: var(--gold); }
    .login-btn {
      width: 100%; margin-top: 20px; padding: 14px; border: none; border-radius: var(--radius);
      background: linear-gradient(135deg, var(--gold), var(--gold-dim));
      color: #1a1a2e; font-size: 16px; font-weight: 700; cursor: pointer;
      font-family: 'Inter', sans-serif; transition: transform .15s, box-shadow .15s;
    }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,197,24,.3); }
    .login-btn:active { transform: translateY(0); }
    .login-error { color: var(--red); font-size: 13px; margin-top: 12px; min-height: 20px; }

    /* ── Dashboard ── */
    #dashboard { display: none; min-height: 100vh; }

    /* Topbar */
    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 62px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(8px);
    }
    .topbar-brand { display: flex; align-items: center; gap: 12px; }
    .topbar-logo { font-size: 20px; font-weight: 800; }
    .topbar-logo .fr { color: var(--gold); font-style: italic; }
    .topbar-logo .vi { color: var(--text); }
    .topbar-tag {
      background: rgba(245,197,24,.15); color: var(--gold);
      border: 1px solid rgba(245,197,24,.3); border-radius: 6px;
      font-size: 11px; font-weight: 700; padding: 3px 10px; letter-spacing: 1px;
    }
    .topbar-right { display: flex; align-items: center; gap: 14px; }
    .btn-logout {
      background: transparent; border: 1px solid var(--border); color: var(--text-dim);
      padding: 7px 16px; border-radius: 8px; font-size: 13px; cursor: pointer;
      font-family: 'Inter', sans-serif; transition: all .2s;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }
    .btn-refresh {
      background: rgba(58,166,255,.1); border: 1px solid rgba(88,166,255,.3);
      color: var(--blue); padding: 7px 14px; border-radius: 8px;
      font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif;
      transition: all .2s; display: flex; align-items: center; gap: 6px;
    }
    .btn-refresh:hover { background: rgba(88,166,255,.2); }

    /* Main Content */
    .main { padding: 28px 24px; max-width: 1400px; margin: 0 auto; }

    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 22px;
      display: flex; align-items: center; gap: 16px;
      transition: transform .2s, box-shadow .2s;
    }
    .stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
    .stat-icon { font-size: 28px; line-height: 1; }
    .stat-info { flex: 1; }
    .stat-num { font-size: 28px; font-weight: 800; line-height: 1; }
    .stat-lbl { font-size: 12px; color: var(--text-dim); margin-top: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: .8px; }
    .stat-card.total   .stat-num { color: var(--text); }
    .stat-card.pending .stat-num { color: var(--yellow); }
    .stat-card.conf    .stat-num { color: var(--green); }
    .stat-card.canc    .stat-num { color: var(--red); }

    /* Toolbar */
    .toolbar {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 18px; margin-bottom: 18px;
    }
    .search-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-wrap input {
      width: 100%; padding: 9px 14px 9px 36px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 8px; color: var(--text);
      font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: border-color .2s;
    }
    .search-wrap input:focus { border-color: var(--gold); }
    .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 14px; pointer-events: none; }
    .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-tab {
      padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border); background: transparent;
      color: var(--text-dim); font-family: 'Inter', sans-serif; transition: all .2s;
    }
    .filter-tab:hover { border-color: var(--gold); color: var(--gold); }
    .filter-tab.active { background: var(--gold); color: #1a1a2e; border-color: var(--gold); }

    /* Table */
    .table-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--surface2); padding: 12px 16px; text-align: left;
      font-size: 11px; font-weight: 700; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 1px;
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,.03); }
    td { padding: 13px 16px; font-size: 14px; vertical-align: middle; }
    .td-name { font-weight: 600; color: var(--text); }
    .td-phone a { color: var(--blue); text-decoration: none; font-weight: 500; }
    .td-phone a:hover { text-decoration: underline; }
    .td-date { color: var(--text); font-weight: 500; white-space: nowrap; }
    .td-guests { color: var(--text-dim); }
    .td-occasion { color: var(--text-dim); font-size: 13px; }
    .td-notes { color: var(--text-dim); font-size: 13px; max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Status Badge */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
      letter-spacing: .3px; white-space: nowrap;
    }
    .badge.pending   { background: rgba(210,153,34,.15);  color: var(--yellow); border: 1px solid rgba(210,153,34,.3); }
    .badge.confirmed { background: rgba(63,185,80,.15);   color: var(--green);  border: 1px solid rgba(63,185,80,.3); }
    .badge.cancelled { background: rgba(248,81,73,.15);   color: var(--red);    border: 1px solid rgba(248,81,73,.3); }

    /* Action Buttons */
    .actions-td { white-space: nowrap; }
    .btn-action {
      padding: 5px 11px; border-radius: 7px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border); background: transparent;
      font-family: 'Inter', sans-serif; transition: all .18s; margin-right: 4px;
    }
    .btn-action:last-child { margin-right: 0; }
    .btn-confirm { color: var(--green); border-color: rgba(63,185,80,.4); }
    .btn-confirm:hover { background: rgba(63,185,80,.15); border-color: var(--green); }
    .btn-cancel  { color: var(--yellow); border-color: rgba(210,153,34,.4); }
    .btn-cancel:hover  { background: rgba(210,153,34,.15); border-color: var(--yellow); }
    .btn-delete  { color: var(--red); border-color: rgba(248,81,73,.4); }
    .btn-delete:hover  { background: rgba(248,81,73,.15); border-color: var(--red); }

    /* Empty State */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    /* Loading spinner */
    .spinner-wrap { text-align: center; padding: 50px 20px; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 20px; font-size: 14px;
      box-shadow: var(--shadow); display: flex; align-items: center; gap: 10px;
      transform: translateY(100px); opacity: 0; transition: all .35s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none; max-width: 320px;
    }
    .toast.show { transform: translateY(0); opacity: 1; pointer-events: auto; }
    .toast.success { border-left: 4px solid var(--green); }
    .toast.error   { border-left: 4px solid var(--red); }
    .toast-icon { font-size: 20px; }

    /* Footer count */
    .table-footer { padding: 12px 18px; color: var(--text-dim); font-size: 13px; border-top: 1px solid var(--border); }

    /* Animations */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 900px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .main { padding: 16px; }
      table { display: block; overflow-x: auto; }
    }
    @media (max-width: 500px) {
      .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .login-card { padding: 32px 22px; }
    }
  </style>
</head>
<body>

  <!-- ══ LOGIN SCREEN ══════════════════════════════════════════════════════════ -->
  <div id="loginScreen">
    <div class="login-card">
      <div class="login-logo">
        <span class="fr">fresh</span><span class="vi">Vibes</span>
        <span class="ca">C A F É</span>
      </div>
      <p class="login-sub">Admin Dashboard — Restricted Access</p>
      <label class="login-label" for="adminKeyInput">🔑 Admin Secret Key</label>
      <input
        type="password"
        id="adminKeyInput"
        class="login-input"
        placeholder="Enter your admin key…"
        autocomplete="current-password"
      />
      <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign In →</button>
      <p class="login-error" id="loginError"></p>
    </div>
  </div>

  <!-- ══ DASHBOARD ════════════════════════════════════════════════════════════ -->
  <div id="dashboard">
    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-brand">
        <div class="topbar-logo"><span class="fr">fresh</span><span class="vi">Vibes</span></div>
        <span class="topbar-tag">ADMIN</span>
      </div>
      <div class="topbar-right">
        <button class="btn-refresh" id="refreshBtn" onclick="loadAll()">
          <span id="refreshIcon">↻</span> Refresh
        </button>
        <button class="btn-logout" onclick="doLogout()">Sign Out</button>
      </div>
    </div>

    <!-- Main -->
    <div class="main">

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card total">
          <div class="stat-icon">📋</div>
          <div class="stat-info">
            <div class="stat-num" id="statTotal">—</div>
            <div class="stat-lbl">Total Bookings</div>
          </div>
        </div>
        <div class="stat-card pending">
          <div class="stat-icon">🟡</div>
          <div class="stat-info">
            <div class="stat-num" id="statPending">—</div>
            <div class="stat-lbl">Pending</div>
          </div>
        </div>
        <div class="stat-card conf">
          <div class="stat-icon">✅</div>
          <div class="stat-info">
            <div class="stat-num" id="statConfirmed">—</div>
            <div class="stat-lbl">Confirmed</div>
          </div>
        </div>
        <div class="stat-card canc">
          <div class="stat-icon">❌</div>
          <div class="stat-info">
            <div class="stat-num" id="statCancelled">—</div>
            <div class="stat-lbl">Cancelled</div>
          </div>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Search by name or phone…" oninput="filterTable()" />
        </div>
        <div class="filter-tabs">
          <button class="filter-tab active" data-status="all"       onclick="setFilter('all',this)">All</button>
          <button class="filter-tab"        data-status="pending"   onclick="setFilter('pending',this)">🟡 Pending</button>
          <button class="filter-tab"        data-status="confirmed" onclick="setFilter('confirmed',this)">✅ Confirmed</button>
          <button class="filter-tab"        data-status="cancelled" onclick="setFilter('cancelled',this)">❌ Cancelled</button>
        </div>
      </div>

      <!-- Table -->
      <div class="table-wrap">
        <div id="tableBody">
          <div class="spinner-wrap"><div class="spinner"></div></div>
        </div>
        <div class="table-footer" id="tableFooter"></div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="adminToast">
    <span class="toast-icon" id="toastIcon"></span>
    <span id="toastMsg"></span>
  </div>

  <script>
    const API = (window.location.hostname === 'localhost' ||
                 window.location.hostname === '127.0.0.1' ||
                 window.location.hostname === '')
      ? 'http://localhost:3001/api'
      : 'https://fresh-vibes-cafe.onrender.com/api';
    let adminKey = '';
    let allData  = [];
    let curFilter = 'all';

    // ── Login ──────────────────────────────────────────────────────────────────
    document.getElementById('adminKeyInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const key = document.getElementById('adminKeyInput').value.trim();
      if (!key) { showLoginError('Please enter the admin key.'); return; }

      const btn = document.getElementById('loginBtn');
      btn.textContent = 'Signing in…';
      btn.disabled = true;

      try {
        const res = await fetch(`${API}/admin/stats`, {
          headers: { 'x-admin-key': key }
        });
        if (res.status === 401) {
          showLoginError('❌ Incorrect admin key. Try again.');
          btn.textContent = 'Sign In →';
          btn.disabled = false;
          return;
        }
        if (!res.ok) {
          showLoginError('⚠️ Server error. Is the backend running?');
          btn.textContent = 'Sign In →';
          btn.disabled = false;
          return;
        }
        adminKey = key;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadAll();
      } catch (err) {
        showLoginError('🔌 Cannot reach server. Make sure backend is running on port 3001.');
        btn.textContent = 'Sign In →';
        btn.disabled = false;
      }
    }

    function showLoginError(msg) {
      document.getElementById('loginError').textContent = msg;
      setTimeout(() => document.getElementById('loginError').textContent = '', 5000);
    }

    function doLogout() {
      adminKey = '';
      allData  = [];
      document.getElementById('adminKeyInput').value = '';
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
    }

    // ── Load All Data ─────────────────────────────────────────────────────────
    async function loadAll() {
      const icon = document.getElementById('refreshIcon');
      icon.style.animation = 'spin .6s linear infinite';
      await Promise.all([loadStats(), loadReservations()]);
      icon.style.animation = '';
    }

    async function loadStats() {
      try {
        const res  = await fetch(`${API}/admin/stats`, { headers: { 'x-admin-key': adminKey } });
        const data = await res.json();
        document.getElementById('statTotal').textContent     = data.total     ?? '—';
        document.getElementById('statPending').textContent   = data.pending   ?? '—';
        document.getElementById('statConfirmed').textContent = data.confirmed ?? '—';
        document.getElementById('statCancelled').textContent = data.cancelled ?? '—';
      } catch (e) { console.error('Stats error:', e); }
    }

    async function loadReservations() {
      document.getElementById('tableBody').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';
      try {
        const res  = await fetch(`${API}/admin/reservations?limit=200`, { headers: { 'x-admin-key': adminKey } });
        const data = await res.json();
        allData = data.reservations || [];
        renderTable();
      } catch (e) {
        document.getElementById('tableBody').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><p>Failed to load. Is the server running?</p></div>';
      }
    }

    // ── Render Table ──────────────────────────────────────────────────────────
    function renderTable() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      let rows = allData.filter(r => {
        const matchStatus = curFilter === 'all' || r.status === curFilter;
        const matchSearch = !search ||
          r.name.toLowerCase().includes(search) ||
          r.phone.toLowerCase().includes(search) ||
          (r.email || '').toLowerCase().includes(search);
        return matchStatus && matchSearch;
      });

      const occasionLabels = {
        regular: 'Regular', birthday: 'Birthday 🎂', anniversary: 'Anniversary 💑',
        family: 'Family', business: 'Business', other: 'Other'
      };

      if (!rows.length) {
        document.getElementById('tableBody').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <p>No reservations found.</p>
          </div>`;
        document.getElementById('tableFooter').textContent = '';
        return;
      }

      const tbody = rows.map(r => {
        const date = new Date(r.createdAt).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'2-digit' });
        const badgeClass = r.status;
        const badgeText  = r.status === 'pending' ? '🟡 Pending' : r.status === 'confirmed' ? '✅ Confirmed' : '❌ Cancelled';
        const occ = occasionLabels[r.occasion] || r.occasion;

        const confirmBtn = r.status !== 'confirmed'
          ? `<button class="btn-action btn-confirm" onclick="updateStatus('${r._id}','confirmed')">Confirm</button>` : '';
        const cancelBtn  = r.status !== 'cancelled'
          ? `<button class="btn-action btn-cancel"  onclick="updateStatus('${r._id}','cancelled')">Cancel</button>` : '';

        return `<tr id="row-${r._id}">
          <td class="td-name">${esc(r.name)}</td>
          <td class="td-phone"><a href="tel:${esc(r.phone)}">${esc(r.phone)}</a></td>
          <td class="td-date">${esc(r.date)}<br><small style="color:var(--text-dim)">${esc(r.time)}</small></td>
          <td class="td-guests">${esc(r.guests)}</td>
          <td class="td-occasion">${occ}</td>
          <td class="td-notes" title="${esc(r.notes || '')}">${esc(r.notes || '—')}</td>
          <td><span class="badge ${badgeClass}">${badgeText}</span></td>
          <td style="color:var(--text-dim);font-size:12px">${date}</td>
          <td class="actions-td">
            ${confirmBtn}${cancelBtn}
            <button class="btn-action btn-delete" onclick="deleteRow('${r._id}')">🗑</button>
          </td>
        </tr>`;
      }).join('');

      document.getElementById('tableBody').innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Name</th><th>Phone</th><th>Date / Time</th><th>Guests</th>
              <th>Occasion</th><th>Notes</th><th>Status</th><th>Received</th><th>Actions</th>
            </tr>
          </thead>
          <tbody>${tbody}</tbody>
        </table>`;
      document.getElementById('tableFooter').textContent = `Showing ${rows.length} of ${allData.length} reservations`;
    }

    // ── Filter & Search ───────────────────────────────────────────────────────
    function setFilter(status, el) {
      curFilter = status;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      renderTable();
    }
    function filterTable() { renderTable(); }

    // ── Update Status ─────────────────────────────────────────────────────────
    async function updateStatus(id, status) {
      try {
        const res = await fetch(`${API}/admin/reservations/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
          body: JSON.stringify({ status })
        });
        if (!res.ok) throw new Error();
        const obj = allData.find(r => r._id === id);
        if (obj) obj.status = status;
        renderTable();
        loadStats();
        showToast('✅', `Booking marked as ${status}.`, 'success');
      } catch {
        showToast('❌', 'Failed to update status.', 'error');
      }
    }

    // ── Delete ────────────────────────────────────────────────────────────────
    async function deleteRow(id) {
      if (!confirm('Delete this reservation permanently?')) return;
      try {
        const res = await fetch(`${API}/admin/reservations/${id}`, {
          method: 'DELETE',
          headers: { 'x-admin-key': adminKey }
        });
        if (!res.ok) throw new Error();
        allData = allData.filter(r => r._id !== id);
        renderTable();
        loadStats();
        showToast('🗑️', 'Reservation deleted.', 'success');
      } catch {
        showToast('❌', 'Failed to delete.', 'error');
      }
    }

    // ── Toast ─────────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(icon, msg, type) {
      const t = document.getElementById('adminToast');
      document.getElementById('toastIcon').textContent = icon;
      document.getElementById('toastMsg').textContent  = msg;
      t.className = `toast ${type} show`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
    }

    // ── Escape HTML ───────────────────────────────────────────────────────────
    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
